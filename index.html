<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPath - Your Learning Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">◈</span>
                    <span class="logo-text">SkillPath</span>
                </div>
            </div>
            <div class="header-center">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Търси ресурси, инструменти, уроци...">
                    <span class="search-shortcut">⌘K</span>
                </div>
            </div>
            <div class="header-right">
                <span class="resource-count">124+ ресурса</span>
            </div>
        </header>
        
        <div class="main-layout">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <span class="nav-label">Категории</span>
                        <ul class="nav-list">
                            <li>
                                <button class="nav-item active" data-category="all">
                                    <span class="nav-icon">⊞</span>
                                    <span>Всички ресурси</span>
                                    <span class="nav-count">64</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Programming/Development">
                                    <span class="nav-icon">⟨/⟩</span>
                                    <span>Programming</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="UI/UX Design">
                                    <span class="nav-icon">◐</span>
                                    <span>UI/UX Design</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Marketing">
                                    <span class="nav-icon">📈</span>
                                    <span>Marketing</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Product and Project Management">
                                    <span class="nav-icon">⚡</span>
                                    <span>Product</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Business and Finance">
                                    <span class="nav-icon">💰</span>
                                    <span>Business</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Sales and Growth">
                                    <span class="nav-icon">🚀</span>
                                    <span>Sales</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                            <li>
                                <button class="nav-item" data-category="Events and Community">
                                    <span class="nav-icon">📅</span>
                                    <span>Events</span>
                                    <span class="nav-count">8</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                </nav>
            </aside>
            
            <main class="content">
                <div class="content-header">
                    <div class="filters">
                        <span class="filters-label">Филтрирай по:</span>
                        <div class="filter-chips">
                            <button class="filter-chip active" data-filter="all">
                                <span>Всички</span>
                            </button>
                            <button class="filter-chip" data-filter="guide">
                                <span class="chip-dot guide"></span>
                                <span>Tutorials</span>
                            </button>
                            <button class="filter-chip" data-filter="tool">
                                <span class="chip-dot tool"></span>
                                <span>Tools</span>
                            </button>
                            <button class="filter-chip" data-filter="faq">
                                <span class="chip-dot faq"></span>
                                <span>FAQs</span>
                            </button>
                            <button class="filter-chip" data-filter="error">
                                <span class="chip-dot error"></span>
                                <span>Issues</span>
                            </button>
                        </div>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid">
                            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        </button>
                        <button class="view-btn" data-view="list">
                            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="4"/><rect x="3" y="10" width="18" height="4"/><rect x="3" y="16" width="18" height="4"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="results-info">
                    <span id="resultsCount">64 ресурса</span>
                    <span class="results-separator">•</span>
                    <span id="currentCategory">Всички категории</span>
                </div>
                
                <div id="resourcesGrid" class="resources-grid"></div>
            </main>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
